name: Handle Source Notification

on:
  repository_dispatch:
    types: [source_repo_updated]
  workflow_dispatch:
    inputs:
      params:
        description: 'command line arguments'
        required: false
        default: ''

jobs:
  process-change:
    runs-on: ubuntu-latest
    steps:
      - name: Log Payload
        run: |
          echo "Received update from source!"
          echo "Commit SHA: ${{ github.event.client_payload.sha }}"
          echo "Message: ${{ github.event.client_payload.message }}"
          
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1
          
      - name: Setup Node to specific version
        uses: actions/setup-node@v3
        with:
          node-version: 24
          
      - name: Install cve-cli
        run: |
          pwd
          # ls -al
          tar -xzvf .github/workflows/cve-cli-0.0.2-rc4.tgz
          cd package
          npm install
          
      - name: Run cve-cli
        run: |
          pwd
          # ls -al
          # cd package
          # copy all code to root directory
          cp -a ./package/. .
          # pwd
          ls -al
          NODE_CONFIG_ENV=devel ./bin/run.js date -v
          # NODE_CONFIG_ENV=devel ./bin/run.js delta deltalog get

          NODE_CONFIG_ENV=sadp ./bin/run.js cvelist update --sourceCvelist
          echo "downloads:"
          ls -alR downloads && ls -R downloads | grep CVE- | wc -l
          echo "cves.sadp:"
          ls -alR cves.sadp && ls -R cves.sadp | grep CVE- | wc -l

          git config --global user.email "github_action@example.com"
          git config --global user.name "cvelistV5 Github Action"
          git add cves.sadp
          git commit -m 'updated SADP to cves.sadp'
          git push
          
